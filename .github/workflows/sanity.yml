name: Sanity Check

on:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  sanity-check:
    # Only run on forks, not on the template repo itself
    if: github.repository != 'unlu-sd2026/exercise-01-node-registry'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest requests
      - run: pytest tests/ -v --tb=short
